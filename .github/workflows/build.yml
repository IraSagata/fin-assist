name: Build Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x

    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build
    - name: Build Docker Image
      run: docker build . -t ghcr.io/${{ github.repository }}:${GITHUB_SHA::7}
    - name: Log into registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker push
      run: docker push ghcr.io/${{ github.repository }}:${GITHUB_SHA::7}
